services:
  analysis-service:
    build:
      context: ..
      dockerfile: analysis-service/Dockerfile
    image: analysis-service:local
    container_name: analysis-service
    ports:
      - "0.0.0.0:8010:8010"
      - "0.0.0.0:14560:14560/udp"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
